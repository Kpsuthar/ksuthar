<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-200 antialiased overflow-x-hidden transition-colors duration-300">

  <header class="bg-white dark:bg-gray-800 shadow-lg py-4 px-6 md:px-12 fixed w-full z-50 top-0 transition-colors duration-300">
    <nav class="flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto">
      <a class='text-2xl font-bold text-blue-600 dark:text-blue-400 hover:text-blue-500 transition-colors duration-300 mb-2 md:mb-0' href='/'>
        <img src="logo.png" alt="KS Logo" width="100">
      </a>
      <ul class="flex items-center space-x-2 md:space-x-8">
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium border-b-2 border-blue-600 dark:border-blue-400' href='/'>Home</a></li>
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/about.html'>About</a></li>
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/projects.html'>Projects</a></li>
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/certifications.html'>Certifications</a></li>
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/contact.html'>Contact</a></li>
        <li>
          <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors focus:outline-none">
              <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
              <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5"></i>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <div class="pt-24"></div>

       <section id="contact" class="mb-20">
            <h2 class="text-4xl font-bold text-center text-blue-600 dark:text-blue-400 mb-12 flex items-center justify-center">
                <i data-lucide="mail" class="w-9 h-9 mr-3"></i> Get In Touch
            </h2>
            
            <div class="max-w-3xl mx-auto glow-card bg-white dark:bg-gray-800 p-8 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-xl dark:shadow-2xl transition-colors duration-300">
                <form id="contact-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="name" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Your Name</label>
                            <input type="text" id="name" name="name" required placeholder="name" 
                                class="w-full bg-gray-50 dark:bg-gray-700/50 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-3 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                        </div>
                        <div>
                            <label for="email" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Your Email</label>
                            <input type="email" id="email" name="email" required placeholder="@gmail.com" 
                                class="w-full bg-gray-50 dark:bg-gray-700/50 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-3 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                        </div>
                    </div>
                    
                    <div>
                        <label for="message" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Let's build something amazing together..." 
                            class="w-full bg-gray-50 dark:bg-gray-700/50 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-3 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all resize-none"></textarea>
                    </div>
                    
                    <button type="submit" id="submit-btn" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all flex justify-center items-center group">
                        Send Message 
                        <i data-lucide="send" class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                    
                    <p id="form-status" class="text-center mt-4 hidden font-medium"></p>
                </form>
            </div>
        </section>
