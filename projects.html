<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiran Suthar - Projects</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/jpg" href="assets/angkonkar.jpg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-200 antialiased transition-colors duration-300">

    <header class="bg-white dark:bg-gray-800 shadow-lg py-4 px-6 md:px-12 fixed w-full z-50 top-0 transition-colors duration-300">
    <nav class="flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto">
        <a class='text-2xl font-bold text-blue-600 dark:text-blue-400 hover:text-blue-500 transition-colors duration-300 mb-2 md:mb-0' href='/'>
        <img src="logo.png" alt="KS Logo" width="100">
        </a>
        <ul class="flex items-center space-x-2 md:space-x-8">
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/'>Home</a></li>
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/about.html'>About</a></li>
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium border-b-2 border-blue-600 dark:border-blue-400' href='/projects.html'>Projects</a></li>
        <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/certifications.html'>Certifications</a></li>
       <li><a class='text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors duration-300 font-medium' href='/contact.html'>Contact</a></li>
        <li>
          <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors focus:outline-none">
              <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
              <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5"></i>
          </button>
        </li>
        </ul>
    </nav>
    </header>

    <section id="projects" class="py-20 px-6 md:px-12 bg-gray-50 dark:bg-gray-950 border-t border-gray-200 dark:border-gray-800 mt-16 transition-colors">
        <div class="max-w-5xl mx-auto">
            <h2 class="text-4xl font-bold text-center text-blue-600 dark:text-blue-400 mb-10 flex items-center justify-center">
                <i data-lucide="award" class="w-9 h-9 mr-3"></i> My Projects
            </h2>

            <div id="filters-container" class="flex flex-wrap justify-center gap-3 mb-10"></div>
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <div id="project-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 border border-gray-700 w-full max-w-2xl rounded-2xl overflow-hidden shadow-2xl transform transition-all">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                <h3 id="modal-title" class="text-2xl font-bold text-blue-400">Project Title</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>

            <div class="p-6 overflow-y-auto max-h-[70vh]">
                <img id="modal-image" src="" alt="Project Preview" class="w-full h-64 object-cover rounded-xl mb-6 border border-gray-600 hidden">
                <div class="mb-6">
                    <h4 class="text-white font-semibold mb-2 flex items-center">
                        <i data-lucide="info" class="w-5 h-5 mr-2 text-blue-400"></i> Project Overview
                    </h4>
                    <p id="modal-description" class="text-gray-400 leading-relaxed"></p>
                </div>
                
                <div class="mb-6">
                    <h4 class="text-white font-semibold mb-2 flex items-center">
                        <i data-lucide="code" class="w-5 h-5 mr-2 text-green-400"></i> Technologies Used
                    </h4>
                    <div id="modal-tech" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <div class="p-6 border-t border-gray-700 flex gap-4">
                <a id="modal-live" href="#" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-center py-2 rounded-lg font-bold transition-all">Live Demo</a>
                
            </div>
        </div>
    </div>

    <footer class="bg-gray-200 dark:bg-gray-800 py-8 px-6 md:px-12 text-center text-gray-600 dark:text-gray-400 border-t border-gray-300 dark:border-gray-700 transition-colors">
        <p>&copy; <span id="current-year"></span> Kiran Suthar.</p>
        <p class="mt-2">Made with <span class="text-red-500">&hearts;</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
